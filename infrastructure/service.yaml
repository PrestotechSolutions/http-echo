apiVersion: v1
kind: Service
metadata:
  name: http-echo-service
  namespace: default
  annotations:
    # Optional: Tell MetalLB which IP pool to use
    # metallb.universe.tf/address-pool: first-pool 
spec:
  type: LoadBalancer
  selector:
    app: http-echo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5678
